kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: production-cluster

nodes:
  - role: control-plane
    image: kindest/node:v1.32.2
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"

    extraPortMappings:
      # ArgoCD (NodePort 30080 -> localhost 8080)
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP

      # Backend (NodePort 30001 -> localhost 3001)
      - containerPort: 30001
        hostPort: 3001
        protocol: TCP

      # Frontend (NodePort 30002 -> localhost 3002)
      - containerPort: 30002
        hostPort: 3002
        protocol: TCP

  - role: worker
    image: kindest/node:v1.32.2

  - role: worker
    image: kindest/node:v1.32.2