apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: production-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/abdelatif2030/production-app.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: production-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true